[package]
name = "nexus-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = []
gstreamer = ["nexus-pipeline/gstreamer"]

[[bin]]
name = "nexus-engine"
path = "src/main.rs"

[dependencies]
nexus-types = { workspace = true }
nexus-config = { workspace = true }
nexus-bus = { workspace = true }
nexus-telemetry = { workspace = true }
nexus-store = { workspace = true }
nexus-rules = { workspace = true }
nexus-tracker = { workspace = true }
nexus-inference = { workspace = true }
nexus-pipeline = { workspace = true }
nexus-storage = { workspace = true }
# Cloud cold backends (Google Drive, OneDrive). Brings reqwest +
# OAuth + per-provider HTTP. The crate is always-on in nexus-engine
# even though LAN-only deployments never instantiate a cloud
# backend — splitting it into a feature flag would multiply the
# CI matrix without saving bytes on disk (reqwest+rustls is
# already in the dep graph via the cold-replicator's HTTP path).
nexus-storage-cloud = { workspace = true }

tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
url = { workspace = true }
parking_lot = { workspace = true }
arc-swap = { workspace = true }
futures = { workspace = true }

axum = { workspace = true }
tower-http = { workspace = true }
tower = { workspace = true }

# HS256 bearer verifier for admin writes (M2.2 Phase 2 step 12).
jsonwebtoken = { workspace = true }

image = { workspace = true }
async-stream = "0.3"
sha2 = "0.10"

# statvfs for the watermark sampler. Unix-only — non-unix builds
# fall back to a never-panic probe (see storage_safety.rs).
[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", default-features = false, features = ["fs"] }

[dev-dependencies]
tempfile = { workspace = true }
base64 = { workspace = true }
