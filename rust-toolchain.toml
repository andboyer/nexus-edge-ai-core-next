[toolchain]
# Pinned to `stable` (currently 1.95). Don't pin a specific minor version
# without bumping `rust-version` in workspace.package — image@0.25.10 needs
# 1.88+ and that floor moves with the dep tree. Verified locally against
# stable 1.95 on aarch64-apple-darwin and on ubuntu-22.04 in CI.
channel = "stable"
components = ["rustfmt", "clippy"]
profile = "minimal"
