# T24 — GMKtec M3 Ultra (Intel i7-12700H, Iris Xe 96 EU, 32 GB DDR4)
# Soak target: 4–6 cameras at 1080p / 15 fps.

[runtime]
worker_threads = 8
blocking_threads = 8

[auth]
# Auto-provisions a 32-byte URL-safe token at
# `/var/lib/nexus/state/dev-token` (mode 0600) on first boot and
# prints it once at WARN. Clients send `Authorization: Bearer <token>`.
# Required because `api_bind` below is non-loopback — the engine
# refuses to run with `mode = "none"` on a LAN-reachable bind.
mode = "dev_token"

[server]
api_bind = "0.0.0.0:8089"
ui_root = "/usr/share/nexus/ui"

[store]
url = "sqlite:///var/lib/nexus/nexus.db?mode=rwc"

[telemetry]
log_level = "info,nexus=debug"

[inference]
backend = "pool"
workers = 2                     # Iris Xe 96 EU comfortably runs two parallel sessions
restart_backoff_ms = 2000
fail_soft = true
ep_priority = ["openvino", "cpu"]

[inference.model]
kind = "yolo"
pack_path = "/usr/share/nexus/models"  # baked into the Docker image; override to /var/lib/nexus/models for custom packs
preset = "640"                  # default operating point per models-manifest.json
input_width = 640
input_height = 640
score_threshold = 0.30

[tracker]
backend = "iou_naive"

[rules]
backend = "cel"

[bus]
backend = "broadcast"
capacity = 1024
