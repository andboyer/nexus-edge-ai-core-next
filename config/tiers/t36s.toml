# T36-S — GMKtec K13 AI / EVO-X1 (Intel Core Ultra 7 256V "Lunar Lake")
#         Arc 140V Xe2 iGPU + NPU 4 (47 TOPS), 16 GB LPDDR5X.
# Soak target: 6–8 cameras at 1080p / 15 fps.
#
# Prerequisites (one-time, see nexus-edge-deploy/docs/OS_INSTALL.md §6.3):
#   - Ubuntu 24.04 with kernel ≥ 6.10
#   - intel-opencl-icd, intel-level-zero-gpu, level-zero
#   - Intel NPU driver trio (intel-driver-compiler-npu, intel-fw-npu, intel-level-zero-npu)
#   - OpenVINO ≥ 2024.4
# If the NPU stack isn't installed yet, `npu` in ep_priority is harmless
# — the engine falls through to `openvino` (iGPU) automatically.

[runtime]
worker_threads = 8
blocking_threads = 8

[runtime.clips]
# Real H.264-passthrough mp4 via the shared RTSP session (detector +
# recorder share one connection per camera via a `tee`). REQUIRES the
# engine to be built with `--features gstreamer`. Without this line
# the runtime default is `recorder = "stub"`, which writes 0-byte
# placeholder files — a common source of "clips don't play" reports.
recorder = "gstreamer"

[auth]
# Customer-facing default since M6 (see docs/ARCHITECTURE.md §11).
# First boot creates a single `admin` user with a one-time password
# printed once at WARN; sign in at `/login` and set a real password.
# The HS256 session-signing secret auto-provisions to
# `/var/lib/nexus/state/admin-secret` (mode 0600). Required because
# `api_bind` below is non-loopback — the engine refuses to run
# because every non-loopback bind needs an authenticating mode.
mode = "local"

[server]
api_bind = "0.0.0.0:8089"
ui_bind = "0.0.0.0:80"
ui_root = "/usr/share/nexus/ui"

[store]
url = "sqlite:///var/lib/nexus/nexus.db?mode=rwc"

[telemetry]
log_level = "info,nexus=debug"

[inference]
backend = "pool"
workers = 2
restart_backoff_ms = 2000
fail_soft = true
# NPU via the OpenVINO EP, CPU as the always-available fallback.
# Do NOT list "openvino" and "npu" both: the OpenVINO EP library
# can only be registered once per session and a duplicate entry trips
# ORT's "Provider OpenVINOExecutionProvider has already been registered"
# guard, which fails the detector load and silently falls back to mock.
# The single "npu" entry dispatches through OpenVINO with device_type=NPU.
ep_priority = ["npu", "cpu"]

[inference.model]
kind = "yolo"
pack_path = "/usr/share/nexus/models"  # baked into the Docker image; override to /var/lib/nexus/models for custom packs
preset = "640"
input_width = 640
input_height = 640
score_threshold = 0.30

[tracker]
backend = "iou_naive"

[rules]
backend = "cel"

[bus]
backend = "broadcast"
capacity = 1536
