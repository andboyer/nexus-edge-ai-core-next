# T64 — Lenovo P3 Tower / HP Z2 G9 + NVIDIA RTX 4060 8 GB (dGPU)
# Soak target: 12–20 cameras at 1080p / 15 fps.
# Status: post-beta. CUDA / TensorRT EPs land in M5; until then the engine
# will fall through to CPU, which is *not* a meaningful T64 deployment.

[runtime]
worker_threads = 16
blocking_threads = 16

[runtime.clips]
# Real H.264-passthrough mp4 via the shared RTSP session (detector +
# recorder share one connection per camera via a `tee`). REQUIRES the
# engine to be built with `--features gstreamer`. Without this line
# the runtime default is `recorder = "stub"`, which writes 0-byte
# placeholder files — a common source of "clips don't play" reports.
recorder = "gstreamer"

[auth]
# Customer-facing default since M6 (see docs/ARCHITECTURE.md §11).
# First boot creates a single `admin` user with a one-time password
# printed once at WARN; sign in at `/login` and set a real password.
# The HS256 session-signing secret auto-provisions to
# `/var/lib/nexus/state/admin-secret` (mode 0600). Required because
# `api_bind` below is non-loopback — the engine refuses to run
# because every non-loopback bind needs an authenticating mode.
mode = "local"

[server]
api_bind = "0.0.0.0:8089"
ui_bind = "0.0.0.0:80"
ui_root = "/usr/share/nexus/ui"
# M-HTTPS Phase 1 — in-process TLS listener for the engine UI.
# `nexus-engine tls init` mints a self-signed leaf on first boot;
# Phase 3 cloud enrollment will overwrite with a cloud-issued leaf.
# With `redirect_http_to_https = true` (default), the `ui_bind`
# listener returns 308 to `https://<host>/<path>` so existing
# `http://nexus/` bookmarks land on TLS automatically.
https_bind = "0.0.0.0:443"
tls_cert_path = "/etc/nexus/tls/cert.pem"
tls_key_path  = "/etc/nexus/tls/key.pem"
# v0.1.36 — HSTS max-age. Runtime-gated: the engine emits the
# Strict-Transport-Security header ONLY when the leaf is the
# cloud-issued cert minted by enrollment-svc (M-HTTPS Phase 3).
# Self-signed bootstrap leaves never advertise HSTS, so this
# value is safe to leave on even before the appliance is
# enrolled with the cloud.
hsts_max_age_seconds = 31536000

[store]
url = "sqlite:///var/lib/nexus/nexus.db?mode=rwc"

[telemetry]
log_level = "info,nexus=debug"

[inference]
backend = "pool"
workers = 3                     # 8 GB VRAM holds three FP16 sessions comfortably
restart_backoff_ms = 2000
fail_soft = true
ep_priority = ["tensorrt", "cuda", "cpu"]

[inference.model]
kind = "yolo"
pack_path = "/usr/share/nexus/models"  # baked into the Docker image; override to /var/lib/nexus/models for custom packs
preset = "640"                  # T64 default = 640 to keep the three-worker pool fitting in 8 GB VRAM. Operators with high-detail use cases (plate / face / small object) can override to 1280 per-camera via the UI — the model registry ships yolo26n_1280.onnx for exactly this.
input_width = 640
input_height = 640
score_threshold = 0.30

[tracker]
backend = "iou_naive"

[rules]
backend = "cel"

[bus]
backend = "broadcast"
capacity = 4096
