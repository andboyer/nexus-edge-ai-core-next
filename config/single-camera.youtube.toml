# Local-dev config — one RTSP camera fed by the youtube-rtsp-bridge,
# real ORT detector (yolo26n @ 640), CoreML-eligible on Apple Silicon.
#
# Schema note: the TOML wire shape is flat (top-level `url`, `enabled`,
# `prompts`, `max_fps`, `parking_lot_mode`, …) and is mapped onto the
# nested Rust groups (`CameraIngest`, `CameraDetector`, `CameraBehavior`)
# via `#[serde(flatten)]`. Same story for rules: `when` / `severity` /
# `camera_filter` / `zones` / `min_track_age_ms` / `consecutive_frames` /
# `cooldown_ms` are flat keys backed by `RulePredicate` / `RuleGates` /
# `RuleDebounce`. Nothing in this file needs to change when the Rust
# structs are reorganised, but keep new optional fields visible here so
# operators copy-pasting from this template see the full surface.
#
# Pre-flight:
#   brew install gstreamer node@22 onnxruntime yt-dlp ffmpeg mediamtx
#   mediamtx                                                      # terminal A
#   tools/youtube-rtsp-bridge/bin/yt-rtsp-bridge.sh \
#       "https://www.youtube.com/watch?v=jfKfPfyJRdk" cam1        # terminal B
#
# Then:
#   ORT_DYLIB_PATH=/opt/homebrew/lib/libonnxruntime.dylib \
#   cargo run --release -p nexus-engine \
#       --features ort,ep-cpu,ep-coreml,gstreamer \
#       -- --config config/single-camera.youtube.toml
#
# `gstreamer` is REQUIRED for rtsp:// URLs — without it the engine silently
# falls back to a 640x480 black-frame VirtualSource.
#
# To add a second LAN camera, copy this file to single-camera.youtube.local.toml
# (gitignored) and append a `[[cameras]]` block with the camera's RTSP URL.
# Never commit credentials.

[runtime]
state_dir = "./data/state"

[runtime.clips]
clips_dir = "./data/clips"
# Real H.264-passthrough mp4 via GstClipRecorder. Requires the engine to
# be built with `--features gstreamer` (it is, for this config). Omit
# this line or set "stub" to get 0-byte placeholder files instead.
recorder = "gstreamer"
# Seconds of pre-motion footage kept in RAM and prepended to each clip.
pre_roll_secs = 5
# Seconds the recorder keeps a clip open after the last live track
# disappears, so brief detection gaps don't split one event into two
# clips. 0 disables post-roll.
post_roll_secs = 5

[server]
api_bind = "127.0.0.1:8089"
ui_root = "ui/dist"

[store]
url = "sqlite:./data/nexus.db?mode=rwc"
seed_from_config = true

[telemetry]
log_level = "info,nexus=debug"

[auth]
mode = "local"

[inference]
backend = "in_process"
workers = 1
ep_priority = ["coreml", "cpu"]

[inference.model]
kind = "yolo"          # closed-vocab yolo26n_dynamic.onnx
pack_path = "models"   # resolves models/models-manifest.json
preset = "640"
score_threshold = 0.30

[tracker]
backend = "iou_naive"

[rules]
backend = "cel"

# Flat wire shape (predicate + gates + debounce all live at the top
# level via `#[serde(flatten)]`). `camera_filter` and `zones` are
# both optional — when present the rule only fires for objects
# inside the listed camera(s) AND inside at least one of the listed
# zone ids on that camera.
[[rules.inline]]
id = "any_person"
name = "Any person"
when = "object.label == 'person'"
severity = "low"
# camera_filter = [1]
# zones = ["studio_window"]
min_track_age_ms = 0
consecutive_frames = 1
cooldown_ms = 5000
enabled = true

# Second rule scoped to the studio window zone — fires only when a
# tracked person sits inside that zone for ≥3 seconds. Demonstrates
# the per-rule zone gate added in M-Admin Phase 4.
[[rules.inline]]
id = "person_in_studio_window"
name = "Person in studio window"
when = "object.label == 'person' && object.attributes['motion.dwell_seconds'] >= 3"
severity = "medium"
zones = ["studio_window"]
min_track_age_ms = 500
consecutive_frames = 2
cooldown_ms = 15000
enabled = false

[bus]
backend = "broadcast"
capacity = 256

[[cameras]]
id = 1
# Live cam1 was renamed in the DB to "Construction Site" once the
# YouTube source was repointed at a 24/7 build-site livestream. We
# track that here so a DB wipe + re-seed reproduces the same shape.
name = "Construction Site"
url = "rtsp://127.0.0.1:8554/cam1"
enabled = true
# YOLO-World prompt subset — every entry below MUST appear in
# `tools/models/yolo_world_default_prompts.txt` and be baked into
# `models/yolo_world_v2_s.onnx`. The detector emits raw English
# labels (no `vehicle.*` / `carried.*` namespace) and this list is
# the per-camera filter applied AFTER detection.
prompts = [
    "person",
    "hardhat",
    "helmet",
    "high-visibility vest",
    "ladder",
    "scissor lift",
    "forklift",
    "truck",
    "excavator",
    "crane",
    "dump truck",
    "cement mixer",
    "bulldozer",
    "wheelbarrow",
    "traffic cone",
    "jersey barrier",
    "scaffolding",
]
# 15 fps strikes the smooth-motion/CPU sweet spot. Below 10 the live
# viewer looks visibly choppy; above 20 the inference backlog grows on
# slower hardware. The viewer polls metadata at 10 Hz, so anything ≥10
# is indistinguishable to a human.
max_fps = 15
# CameraBehavior knob — opt-in to the static-object filter from
# `tracker.static_object.*`. Off for a construction site (cones,
# barriers, parked equipment all churn over a workday; the filter
# was tuned for empty parking lots).
parking_lot_mode = false

# Polygon zones in normalized (0..1) coordinates. The "Street",
# "Site", and "Parking Lot" zones were drawn against the live
# construction-site stream framing. `kind = "inclusion"` participates
# in `motion.zone_state` and the per-rule `zones` gate.
[[cameras.zones]]
id = "f26bfc07-ca16-42ed-8364-99737d7722c8"
name = "Street"
polygon = [
