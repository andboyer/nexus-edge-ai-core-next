# Per-camera detector override — swaps cam1 from the workspace
# default (`yolo` / yolo26n.onnx, COCO 80-class) to YOLO-World v2
# small with the 44-prompt vocab so construction-site equipment
# (excavator, crane, dump truck, cement mixer, bulldozer,
# wheelbarrow, traffic cone, jersey barrier, scaffolding) becomes
# detectable. `score_threshold = 0.10` is the recommended starting
# point for YOLO-World — its open-vocabulary scores run lower than
# the closed-set YOLO baseline.
#
# IMPORTANT: changing this requires an engine restart. The router
# (crates/nexus-inference/src/router.rs) builds one inference layer
# per distinct `model_override.kind` at boot; the reconciler does
# NOT rebuild the router when overrides change via API.
[cameras.model_override]
kind = "yolo_world"
pack_path = "models"
preset = "640"
input_width = 640
input_height = 640
score_threshold = 0.10

# ---------------------------------------------------------------------------
# M7 alert-delivery sinks (optional). Each `[[sinks]]` entry registers one
# downstream target. Rows in `alert_sink_outbox` reference `<kind>:<name>`,
# so a sink rename is forbidden — delete + re-add instead.
#
# The webhook sink requires the engine to be built with the `webhook` feature
# (the workspace `nexus-engine` Cargo.toml already enables it on `nexus-sinks`).
# When `hmac_secret` is set, the dispatcher ships a GitHub-compatible
# `X-Nexus-Signature: sha256=<hex>` header computed over the raw JSON body;
# operator-provided `[sinks.headers]` cannot override it.
#
# Uncomment to ship every alert from this engine to a webhook:
#
# [[sinks]]
# kind = "webhook"
# name = "primary"
# url  = "https://example.com/nexus-webhook"
# # hmac_secret  = "shared-secret"            # optional; enables signature
# # timeout_secs = 10                         # optional; default 10s
#
# [sinks.headers]                             # optional; verbatim HTTP headers
# # "Authorization" = "Bearer xyz"
# # "X-Tenant"      = "acme"
# ---------------------------------------------------------------------------
