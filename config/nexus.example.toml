# nexus.example.toml — fully annotated reference.
#
# Defaults below are sized for the **T24** tier (GMKtec M3 Ultra, Iris Xe
# 96 EU). For other documented hardware tiers (T10 Beelink Mini S13, T36
# Arc A380, T36-S Lunar Lake, T64 RTX 4060) copy one of the per-tier
# files in `config/tiers/` instead. See [docs/HARDWARE_TIERS.md](../docs/HARDWARE_TIERS.md).
#
# Every backend-selectable layer exposes a `backend` knob. Everything else
# under that section configures the chosen backend.

[runtime]
# 0 = use available_parallelism().
worker_threads = 0
blocking_threads = 8
# M3.1 — where the engine writes uploaded YOLOE visual-prompt
# reference images. Each upload to POST /v1/admin/visual-prompts
# is content-addressed (SHA256 over the bytes) and stored as
# `<sha>.<ext>`; the embedding lives in the database. Default
# `/var/lib/nexus/visual_prompts`. Created on demand. Operators
# who put `clips_dir` on a separate disk usually want this on
# the same disk (uploads are small but admin-only writes).
# visual_prompts_dir = "/var/lib/nexus/visual_prompts"

[runtime.clips]
# Where the recorder writes mp4 files. Created on demand.
clips_dir = "/var/lib/nexus/clips"
# Daily retention sweeper deletes clips older than this. The watermark
# sampler can evict sooner if disk pressure rises.
motion_clips_retention_days = 30
# Cap on `track.updated` motion-event row writes per active track per
# second. `track.born` and `track.died` are always emitted.
motion_events_sample_hz = 1.0
# Below this percentage of free space on the clips_dir filesystem, the
# watermark sampler starts evicting one round per check.
low_watermark_pct = 15
# Below this percentage the recorder refuses to open new clips and
# eviction runs hard until free space recovers to low + 5pct.
panic_watermark_pct = 5
# How often the watermark sampler runs.
watermark_sample_interval_secs = 30

[server]
api_bind = "0.0.0.0:8089"
# Optional second listener — same router, same auth — so operators
# can reach the admin console at `http://<host>/` without typing
# the engine port. Comment out to bind only `api_bind`. Binding
# port <1024 needs `CAP_NET_BIND_SERVICE` (Docker has it; the
# systemd unit in docs/INSTALL.md §7.7 sets it).
ui_bind = "0.0.0.0:80"
# In the container the UI is at /usr/share/nexus/ui. Locally use ui/dist.
ui_root = "/usr/share/nexus/ui"

[store]
url = "sqlite:///var/lib/nexus/nexus.db?mode=rwc"
seed_from_config = true
duckdb_attach = false
duckdb_path = "/var/lib/nexus/analytics.duckdb"

[telemetry]
log_level = "info,nexus=debug"
json_logs = false
# [telemetry.otlp]
# endpoint = "http://otel-collector:4317"
# service_name = "nexus-engine"
# sample_ratio = 0.05

[auth]
# Customer-facing default since M6. First boot creates a single
# `admin` user with a one-time password printed once at WARN;
# sign in at `/login` and set a real password. The HS256 session-
# signing secret auto-provisions to `<runtime.state_dir>/admin-secret`
# (mode 0600). See `docs/ARCHITECTURE.md §11` for the full identity
# model and `docs/INSTALL.md §8.3` for the alternatives below.
mode = "local" # local | oidc | hybrid
# admin_secret_path = "/var/lib/nexus/state/admin-secret"  # pin to skip autoprovision
#
# --- Identity architecture (read before changing `mode`) ----------
# The shipping product authenticates end users at the cloud-console
# (nexus-cloud-console repo) — one Entra External ID app, one secret,
# held in YOUR Azure Key Vault. Edge cores accept short-lived
# `actor_token` JWTs minted by the cloud-console and forwarded over
# the mTLS tunnel. See `docs/ARCHITECTURE.md §11`.
#
# That means edge boxes do NOT need per-deployment OIDC config:
#
#   * `mode = "local"`  — default for a fresh install. Boots with a
#                         one-time admin OTP printed at WARN; admin
#                         sets a password on first login. This is
#                         ALSO the offline escape hatch when the
#                         cloud-console tunnel is unreachable.
#   * `mode = "oidc"`   — EXPERT MODE for the rare on-prem deployment
#                         that wants to point a single edge box at a
#                         site-local Authentik / Keycloak / AD FS.
#                         Not the customer-facing default; ships
#                         unconfigured. See `docs/M6_IDENTITY.md`.
#   * `mode = "hybrid"` — both local + OIDC; OIDC for normal sign-in,
#                         a single local `breakglass` admin for IdP
#                         outages. Same expert-mode caveat applies.
#
# Below: the OIDC block stays as a reference template for the expert
# path. It is intentionally commented out — leaving `[auth.oidc]`
# defined while `mode != "oidc" | "hybrid"` is harmless but pointless.
#
# [auth.oidc]
# issuer        = "https://auth.example.com/application/o/nexus"
# audience      = "nexus-engine"
# client_id     = "nexus-engine"
# display_name  = "Corporate SSO"
# # `redirect_uri` is OPTIONAL for Authentik / Keycloak / Okta / Google
# # (they accept the relative path `/api/v1/auth/oidc/callback`).
# # REQUIRED for Microsoft Entra ID, which mandates a full HTTPS URL.
# # redirect_uri = "https://nexus.example.com/api/v1/auth/oidc/callback"
# # Confidential client? Wire the secret via ONE of these (mutually
# # exclusive). See `docs/M6_IDENTITY.md` for k8s / Docker / systemd
# # patterns that avoid hand-installing the secret file on every box.
# # client_secret_file = "/run/secrets/oidc"
# # client_secret_env  = "NEXUS_OIDC_CLIENT_SECRET"
# scopes        = ["openid", "profile", "email", "groups"]
#
# [auth.oidc.role_map]
# admin    = ["nexus-admins"]
# operator = ["nexus-operators"]
# viewer   = ["nexus-viewers"]

# -----------------------------------------------------------------
# Inference — the trait + pool + scale-factor pattern lives here.
# Per-tier defaults live in config/tiers/. The values below are T24.
# -----------------------------------------------------------------
[inference]
backend = "pool"          # in_process | pool
workers = 2
restart_backoff_ms = 2000
fail_soft = true
# Default order for Intel-based tiers (T10/T24/T36/T36-S). T64 leads with
# tensorrt; T36-S inserts "npu" between openvino and cpu. coreml is dev-only.
ep_priority = ["openvino", "cpu"]

[inference.model]
# yolo (default, closed-vocab yolo26n_dynamic.onnx) | open_vocab | classifier_ensemble | mock
kind = "yolo"
# Pack preset — "320" / "640" / "1280" from models-manifest.json.
#   T10 → 320 (lowest latency)
#   T24 / T36 / T36-S / T64 → 640 (default operating point)
#   regional refinement → 1280 (per-frame second pass on uncertain regions)
preset = "640"
# pack_path = "/var/lib/nexus/models/yolo26n"
input_width = 640
input_height = 640
score_threshold = 0.30

# -----------------------------------------------------------------
# Tracker
# -----------------------------------------------------------------
[tracker]
backend = "iou_naive" # iou_naive | bytetrack
track_ttl_ms = 2000
iou_threshold = 0.30

# -----------------------------------------------------------------
# Rules — CEL.
# -----------------------------------------------------------------
[rules]
backend = "cel" # cel

[[rules.inline]]
id = "person_in_zone"
name = "Person seen"
when = "object.label == 'person' && object.confidence > 0.4"
severity = "medium"
min_track_age_ms = 500
consecutive_frames = 2
cooldown_ms = 30000
enabled = true

# -----------------------------------------------------------------
# Bus
# -----------------------------------------------------------------
[bus]
backend = "broadcast" # broadcast | nats
capacity = 1024
# nats_url = "nats://nats:4222"

# -----------------------------------------------------------------
# Cameras (DB is the source of truth; this seeds an empty DB)
# -----------------------------------------------------------------
[[cameras]]
id = 1
name = "Front Door"
url = "rtsp://demo:demo@front-door.local:554/Streaming/Channels/101"
enabled = true
prompts = ["person", "package", "vehicle"]
max_fps = 10

[[cameras.zones]]
id = "porch"
name = "Porch"
polygon = [[0.1, 0.5], [0.9, 0.5], [0.9, 1.0], [0.1, 1.0]]
kind = "inclusion"
