# Smoke-test config — single virtual camera, mock detector. Used by
# `cargo run --bin nexus-engine -- --config config/single-camera.toml --mock-detector`.

# Local-dev paths so this config works as-is on macOS / Apple Silicon
# (no /var/lib/nexus access required).
[runtime]
state_dir = "./data/state"

[runtime.clips]
clips_dir = "./data/clips"

[server]
# Loopback by default — keeps the smoke harness off the LAN.
# For a LAN-reachable bind switch to a non-loopback address;
# `auth.mode = "local"` below stays valid in both cases.
# See docs/ARCHITECTURE.md §11 for the full identity matrix.
api_bind = "127.0.0.1:8089"
ui_root = "ui/dist"

[store]
url = "sqlite:./data/nexus.db?mode=rwc"
seed_from_config = true

[telemetry]
log_level = "info,nexus=debug"

# Local mode auto-provisions <state_dir>/admin-secret on first
# boot; the smoke harness uses loopback so no actual login is
# required.
[auth]
mode = "local"

[inference]
backend = "in_process"
workers = 1

[inference.model]
kind = "mock"
input_width = 640
input_height = 480

[tracker]
backend = "iou_naive"

[rules]
backend = "cel"

[[rules.inline]]
id = "any_person"
name = "Any person"
when = "object.label == 'person'"
severity = "low"
min_track_age_ms = 0
consecutive_frames = 1
cooldown_ms = 5000
enabled = true

[bus]
backend = "broadcast"
capacity = 256

[[cameras]]
id = 1
name = "Virtual"
url = "virtual://local"
enabled = true
prompts = ["person"]
max_fps = 5
