# Smoke-test config — single virtual camera, mock detector. Used by
# `cargo run --bin nexus-engine -- --config config/single-camera.toml --mock-detector`.

# Local-dev paths so this config works as-is on macOS / Apple Silicon
# (no /var/lib/nexus access required).
[runtime]
state_dir = "./data/state"

[runtime.clips]
clips_dir = "./data/clips"

[server]
# Loopback by default — required by M-Install Checkpoint 2 when
# auth.mode = "none". Flip to 0.0.0.0 only with auth.mode = "dev_token".
api_bind = "127.0.0.1:8089"
ui_root = "ui/dist"

[store]
url = "sqlite:./data/nexus.db?mode=rwc"
seed_from_config = true

[telemetry]
log_level = "info,nexus=debug"

# Explicit so the grandfather WARN doesn't fire on the dev loop.
# Loopback bind above keeps this safe.
[auth]
mode = "none"

[inference]
backend = "in_process"
workers = 1

[inference.model]
kind = "mock"
input_width = 640
input_height = 480

[tracker]
backend = "iou_naive"

[rules]
backend = "cel"

[[rules.inline]]
id = "any_person"
name = "Any person"
when = "object.label == 'person'"
severity = "low"
min_track_age_ms = 0
consecutive_frames = 1
cooldown_ms = 5000
enabled = true

[bus]
backend = "broadcast"
capacity = 256

[[cameras]]
id = 1
name = "Virtual"
url = "virtual://local"
enabled = true
prompts = ["person"]
max_fps = 5
