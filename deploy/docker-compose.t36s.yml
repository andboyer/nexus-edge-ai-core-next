# T36-S — GMKtec K13 AI / EVO-X1 (Intel Ultra 7 256V Lunar Lake / Arc 140V
# Xe2 iGPU + NPU 4). EP order: openvino → npu → cpu. 6–8 cameras @ 1080p15.
#
# Usage on the box:
#   ln -s /opt/nexus/src/deploy/docker-compose.yml          docker-compose.yml
#   ln -s /opt/nexus/src/deploy/docker-compose.t36s.yml     docker-compose.override.yml
#   docker compose pull && docker compose up -d
#
# Compose auto-merges `docker-compose.override.yml`, so subsequent commands
# are just `docker compose pull && docker compose up -d` — no `-f` juggling.
#
# -----------------------------------------------------------------------------
# NPU CAVEAT — READ BEFORE ENABLING `/dev/accel/accel0`
# -----------------------------------------------------------------------------
# INSTALL.md §5.3 currently steers T36-S NPU users at the bare-metal systemd
# path (§7) — container NPU passthrough is fragile on the kernels available
# today. This overlay defaults to **iGPU-only** so the engine boots cleanly
# and falls through to the OpenVINO EP on the Arc 140V iGPU (the second-most
# powerful slot in the `ep_priority` list for this tier).
#
# To enable NPU passthrough later (once the kernel + driver trio in
# §5.3 are confirmed working on the host and `ls -l /dev/accel/accel0`
# succeeds outside the container):
#
#   1. Uncomment the `/dev/accel/accel0` line in `devices:` below.
#   2. Confirm the host user owning the device has gid in `render`
#      (the group_add below already maps that in).
#   3. `docker compose up -d --force-recreate`.
#
# If the NPU disappears after a kernel upgrade, comment the line back
# out — the engine's `ep_priority = ["openvino", "npu", "cpu"]` will
# silently drop the NPU slot and keep running on the iGPU.
# -----------------------------------------------------------------------------
services:
  engine:
    image: ghcr.io/andboyer/nexus-engine:latest
    devices:
      # Arc 140V iGPU (OpenVINO EP). Always required.
      - /dev/dri:/dev/dri
      # NPU 4 — opt in only after §5.3 is confirmed green on the host.
      # - /dev/accel/accel0:/dev/accel/accel0
    group_add:
      - "video"
      - "render"
    volumes:
      # Bind-mount the host state dir (uid 1000 / gid 1000, set in
      # INSTALL.md §4.3) over the named volume from the base compose.
      # This is where the engine writes nexus.db, clips, models, and the
      # auto-provisioned dev-token.
      - /etc/nexus:/etc/nexus:ro
      - /var/lib/nexus:/var/lib/nexus
    environment:
      - NEXUS_CONFIG=/etc/nexus/nexus.toml
      - NEXUS_TIER=t36s
