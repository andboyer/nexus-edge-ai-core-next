# Single-service deploy. The engine container holds the API, the UI, and
# the per-camera pipelines. No admin sidecar, no viewer sidecar.
#
# Production usage: stack a per-tier overlay on top of this file. Each
# overlay supplies the right `devices:` / `group_add:` block plus the
# tier-pinned NEXUS_CONFIG env. See `deploy/docker-compose.t10.yml`,
# `t24.yml`, `t36s.yml`. Symlink the chosen one to
# `docker-compose.override.yml` next to this file and Compose auto-merges.
#
# Dev usage (no overlay): `docker compose up -d` builds locally and runs
# without GPU passthrough. Virtual sources don't need acceleration.
services:
  engine:
    # Local build for dev iteration. Production overlays pin
    # `image: ghcr.io/andboyer/nexus-engine:vX.Y.Z` and never hit the
    # `build:` path. Released images are published by
    # `.github/workflows/release.yml` on tag push.
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ghcr.io/andboyer/nexus-engine:latest
    container_name: nexus-engine
    restart: unless-stopped
    ports:
      - "8089:8089"
      # Optional UI alias on the standard HTTP port so operators can
      # reach the console at `http://<host>/`. Matches
      # `[server].ui_bind = "0.0.0.0:80"` in nexus.toml. Comment
      # both lines out if port 80 is already taken on the host.
      - "80:80"
    volumes:
      - ../config:/etc/nexus:ro
      - nexus-state:/var/lib/nexus
    environment:
      - NEXUS_CONFIG=/etc/nexus/nexus.toml
      - RUST_LOG=info,nexus=debug
      # --- OIDC client secret (optional) ---------------------------
      # Pick exactly ONE of the two patterns below; never both.
      #
      # Pattern A — Docker secret (recommended for compose deploys).
      # Uncomment the `secrets:` block on both the engine service AND
      # at the top level, drop the secret value into the file named
      # in the top-level `file:`, and point your nexus.toml at the
      # mount path: `client_secret_file = "/run/secrets/oidc"`.
      # Docker enforces mode 0400 owned by root inside the container.
      #
      # Pattern B — env var (recommended for k8s / PaaS, also works
      # under compose). Uncomment and set the value in a .env file
      # next to this compose file (never commit .env), then point
      # your nexus.toml at: `client_secret_env = "NEXUS_OIDC_CLIENT_SECRET"`.
      # - NEXUS_OIDC_CLIENT_SECRET=${NEXUS_OIDC_CLIENT_SECRET}
    # secrets:
    #   - oidc
    # GPU passthrough lives in the per-tier overlay files. Examples:
    #   Intel iGPU / Arc:   devices: ["/dev/dri:/dev/dri"]
    #   NVIDIA:             runtime: nvidia, deploy.resources.reservations.devices ...
    #   Intel NPU:          devices: ["/dev/accel/accel0:/dev/accel/accel0"]

volumes:
  nexus-state: {}

# Top-level `secrets:` block for Pattern A above. The file path is
# the HOST path holding the raw secret value (no newline, mode 0600).
# Drop a 0600 file at e.g. /etc/nexus/oidc-client-secret on the host
# and Docker bind-mounts it as /run/secrets/oidc inside the container.
# secrets:
#   oidc:
#     file: /etc/nexus/oidc-client-secret
