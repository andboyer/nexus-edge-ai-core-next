# T24 — GMKtec M3 Ultra (Intel i7-12700H / Iris Xe 96 EU). EP order:
# openvino → cpu. 4–6 cameras @ 1080p15. Workhorse of the tier pyramid.
#
# Usage on the box:
#   ln -s /opt/nexus/src/deploy/docker-compose.yml          docker-compose.yml
#   ln -s /opt/nexus/src/deploy/docker-compose.t24.yml      docker-compose.override.yml
#   docker compose pull && docker compose up -d
#
# Compose auto-merges `docker-compose.override.yml`, so subsequent commands
# are just `docker compose pull && docker compose up -d` — no `-f` juggling.
services:
  engine:
    image: ghcr.io/andboyer/nexus-engine:latest
    # Intel Iris Xe iGPU passthrough — OpenVINO EP picks this up via the
    # render node automatically; falls through to CPU if the device isn't
    # there.
    devices:
      - /dev/dri:/dev/dri
    # Numeric host GIDs for /dev/dri access. Docker resolves group_add
    # names against the CONTAINER's /etc/group (which has no render or
    # video group baked in), so we pass numeric GIDs from the host
    # instead. Defaults match Debian 12 / Ubuntu 22.04+ stock GIDs;
    # override per-box via `.env` if `getent group render` differs:
    #   echo NEXUS_RENDER_GID=$(getent group render | cut -d: -f3) >> /opt/nexus/deploy/.env
    #   echo NEXUS_VIDEO_GID=$(getent group video  | cut -d: -f3) >> /opt/nexus/deploy/.env
    group_add:
      - "${NEXUS_VIDEO_GID:-44}"
      - "${NEXUS_RENDER_GID:-993}"
    volumes:
      # Bind-mount the host state dir (uid 1000 / gid 1000, set in
      # INSTALL.md §4.3) over the named volume from the base compose.
      # This is where the engine writes nexus.db, clips, models, and the
      # auto-provisioned dev-token.
      - /etc/nexus:/etc/nexus:ro
      - /var/lib/nexus:/var/lib/nexus
    environment:
      - NEXUS_CONFIG=/etc/nexus/nexus.toml
      - NEXUS_TIER=t24
