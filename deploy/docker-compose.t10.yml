# T10 — Beelink Mini S13 (Intel N150 / UHD 24EU iGPU). EP order:
# openvino → cpu. 1–2 cameras @ 1080p15.
#
# Usage on the box:
#   ln -s /opt/nexus/src/deploy/docker-compose.yml          docker-compose.yml
#   ln -s /opt/nexus/src/deploy/docker-compose.t10.yml      docker-compose.override.yml
#   docker compose pull && docker compose up -d
#
# Compose auto-merges `docker-compose.override.yml`, so subsequent commands
# are just `docker compose pull && docker compose up -d` — no `-f` juggling.
services:
  engine:
    image: ghcr.io/andboyer/nexus-engine:latest
    # Intel iGPU passthrough — OpenVINO EP picks this up via the render
    # node automatically; falls through to CPU if the device isn't there.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "video"
      - "render"
    volumes:
      # Bind-mount the host state dir (uid 1000 / gid 1000, set in
      # INSTALL.md §4.3) over the named volume from the base compose.
      # This is where the engine writes nexus.db, clips, models, and the
      # auto-provisioned dev-token.
      - /etc/nexus:/etc/nexus:ro
      - /var/lib/nexus:/var/lib/nexus
    environment:
      - NEXUS_CONFIG=/etc/nexus/nexus.toml
      - NEXUS_TIER=t10
