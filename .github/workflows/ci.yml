name: ci

# Verifies every push and PR. The whole point of M0 is that this workflow
# turns red the moment we type-drift the workspace, the UI, or the
# Dockerfile — without needing rustup on anyone's mac.
#
# Default features are empty everywhere on purpose (gstreamer + ort are
# optional cargo features) so the standard ubuntu-latest runner does real
# work without dragging in system libs. The `system-libs` job below opts
# the heavy features in on a runner that does have them installed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref. Keeps the queue honest.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Note: -D warnings is applied per-step on `cargo clippy`, not globally,
  # so dependency-side warnings on a future rustc don't break our CI.

jobs:
  # ---------------------------------------------------------------------
  # Blocking formatting check. Required since 2026-05-13 once a local
  # rustfmt sweep was applied (commit on the same push as Cargo.lock).
  # ---------------------------------------------------------------------
  fmt:
    name: rust (fmt --check)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------
  # Rust workspace (default features only — no GStreamer, no ORT system libs).
  # ---------------------------------------------------------------------
  rust:
    name: rust (check / clippy / test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # `rustup show active-toolchain || rustup toolchain install` is the
      # canonical way to make rustup honor rust-toolchain.toml (which pins
      # the version + components rustfmt/clippy). The dtolnay action with
      # `@stable` would override the pin, which we don't want.
      - name: install rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add clippy

      - name: cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      - name: cargo check (workspace, all targets)
        run: cargo check --locked --workspace --all-targets

      - name: cargo clippy (deny warnings)
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --locked --workspace --no-fail-fast

  # ---------------------------------------------------------------------
  # ts-rs roundtrip — running `cargo test -p nexus-types --features ts`
  # regenerates one `*.ts` file per `#[derive(TS)]` type into
  # `ui/src/api/types/`. `git diff --exit-code` then fails if Rust-side
  # schema changes weren't accompanied by a re-committed binding. The
  # hand-curated `ui/src/api/types.ts` is the UI's import surface and is
  # NOT generated — it's hand-mirrored once per intentional shape change.
  # ---------------------------------------------------------------------
  rust-ts-feature:
    name: rust (nexus-types ts feature)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - name: cargo test -p nexus-types --features ts (regenerates ui/src/api/types/)
        run: cargo test --locked -p nexus-types --features ts
      - name: verify no drift in generated bindings
        run: |
          if ! git diff --exit-code -- ui/src/api/types/; then
            echo "::error::ts-rs bindings drifted from Rust derives in nexus-types."
            echo "Run: cargo test -p nexus-types --features ts && git add ui/src/api/types/"
            exit 1
          fi

  # ---------------------------------------------------------------------
  # UI — TypeScript typecheck + production build. Uploads dist/ so the
  # docker job (and humans clicking "Download artifact") can grab it.
  # ---------------------------------------------------------------------
  ui:
    name: ui (typecheck / build)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build

      - name: upload ui dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------
  # Dockerfile smoke build. Doesn't push; just proves the multi-stage
  # build still wires together. Only runs on push to main + PRs that
  # touch deploy/ or root manifests, to keep iteration fast.
  # ---------------------------------------------------------------------
  docker:
    name: docker (build, no push)
    runs-on: ubuntu-22.04
    needs: [rust, ui]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'docker')
    steps:
      - uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build (no push, gha cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: false
          tags: nexus-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  # M-Install Checkpoint 2 — kitchen-sink EP image build. Same
  # Dockerfile as the `docker` job above, but with `--build-arg
  # FEATURES=ort,ep-cpu,ep-openvino,ep-cuda,ep-tensorrt` so every
  # execution provider is linked into the engine binary. The release
  # pipeline (Checkpoint 3) will reuse this exact build args set when
  # publishing `:latest` to GHCR.
  #
  # Push gates are identical to the plain `docker` job (push to main +
  # `system-libs` label) so a typical PR doesn't pay the longer build
  # time. CUDA + TensorRT objects are large; gha-cache amortises
  # everything past the first run on a given branch.
  # ---------------------------------------------------------------------
  docker-all-eps:
    name: docker (all-EPs build, no push)
    runs-on: ubuntu-22.04
    needs: [rust, ui]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'system-libs')
    steps:
      - uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build (all EPs, no push, gha cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: false
          tags: nexus-engine:ci-all-eps
          # Kitchen sink. Drop one EP at a time if a release-blocker
          # surfaces; do NOT split into per-EP jobs without weighing
          # the matrix-cost first (each adds ~8 min cold).
          build-args: |
            FEATURES=ort,ep-cpu,ep-openvino,ep-cuda,ep-tensorrt
          cache-from: type=gha,scope=docker-all-eps
          cache-to: type=gha,scope=docker-all-eps,mode=max

  # ---------------------------------------------------------------------
  # Optional: build with the heavy `gstreamer` + `ort` features enabled.
  # Runs on every push to main and on PRs labeled `system-libs`. Failures
  # block release but not normal PR iteration.
  #
  # Apt cache (~200 MB of .debs) is persisted across runs via
  # `cache-apt-pkgs-action` — first run is ~20 s on the dev box of the
  # week, subsequent runs ~3 s. Before this caching the apt step was
  # 10–20 min of wall clock because Azure's apt mirrors are sometimes
  # painfully slow; everything past `apt install` only takes ~10 s.
  #
  # Package list is intentionally MINIMAL — dev headers only:
  #   * pkg-config: gstreamer-rs invokes pkg-config at build time.
  #   * libgstreamer1.0-dev, libgstreamer-plugins-base1.0-dev: gstreamer
  #     core + base .pc files & headers. These transitively pull every
  #     library gstreamer-rs links to (gstreamer-1.0, gstreamer-base-1.0,
  #     glib-2.0, gobject-2.0).
  # NOT installed (would be runtime-only / not exercised by `cargo check`):
  #   * gstreamer1.0-plugins-good / -bad / -libav  (runtime plugins).
  #   * libssl-dev (workspace uses rustls everywhere; Cargo.lock has no
  #     openssl / openssl-sys / native-tls — re-verify if that changes).
  #   * libunwind-dev (was needed only on ubuntu-22.04; 24.04 resolves
  #     libgstreamer1.0-dev's transitives clean).
  # ---------------------------------------------------------------------
  system-libs:
    name: rust (gstreamer + ort features)
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'system-libs')
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-system-libs

      - name: install gstreamer dev headers (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # Keyed by package list; bumping a package version invalidates.
          packages: pkg-config libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
          version: 1

      - name: cache onnxruntime tarball
        id: ort-cache
        uses: actions/cache@v4
        with:
          path: /opt/onnxruntime
          # ort 2.0.0-rc.10 binds to onnxruntime 1.20.x ABI; bump together.
          key: onnxruntime-linux-x64-1.20.0-v1

      - name: download onnxruntime shared lib
        if: steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          ORT_VERSION=1.20.0
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | sudo tar -xz -C /opt
          sudo mv /opt/onnxruntime-linux-x64-${ORT_VERSION} /opt/onnxruntime

      - name: export onnxruntime paths
        run: |
          echo "LD_LIBRARY_PATH=/opt/onnxruntime/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          echo "ORT_DYLIB_PATH=/opt/onnxruntime/lib/libonnxruntime.so"   >> $GITHUB_ENV

      - name: cargo check (gstreamer + ort)
        run: |
          cargo check --locked -p nexus-pipeline  --features gstreamer
          cargo check --locked -p nexus-inference --features ort,ep-cpu
          cargo check --locked -p nexus-engine    --features gstreamer
