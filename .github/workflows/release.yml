# ---------------------------------------------------------------------------
# Release pipeline — bare-metal tarball only (Docker removed 2026-05-23).
#
# Triggered on `release: published`. Builds a self-contained Linux x86_64
# tarball with binaries, UI, ONNX models, ONNX-Runtime + OpenVINO shared
# libs, tier templates, systemd unit, and installer scripts, then attaches
# it to the GitHub Release.
#
# Operator workflow (zero manual asset upload required per engine cut):
#
#   gh release create vX.Y.Z --target main \
#     --title "vX.Y.Z" --generate-notes
#
# Model pack is decoupled from engine version. The workflow reads
# `pack_version` from `models/models-manifest.json` (git-tracked) and
# downloads the ONNX files from the matching `models-${PACK_VERSION}`
# GitHub Release. That release is cut ONCE per model rev (rarely),
# reused by every engine cut. Bumping the pack:
#
#   1. Regenerate ONNX (`python tools/models/gen_*.py --all-static`).
#   2. Bump `pack_version` in models/models-manifest.json.
#   3. Commit + push.
#   4. `gh release create models-vN --prerelease --title "Model pack vN"`
#      `gh release upload models-vN models/yolo26n_*.onnx \`
#         `models/yolo_world_v2_s_*.onnx models/yoloe26_s.onnx \`
#         `models/models-manifest.json`
#
# `yolo26n.pt` is not a public ultralytics checkpoint, so the operator
# must run step 1 locally — GH-hosted runners cannot regenerate it.
# yolo_world / yoloe ONNX could be runner-generated but the codepath
# isn't wired since they piggyback on the same pack-version cadence.
#
# Engine release assets (small surface, no per-cut ONNX duplication):
#   * <tarball>.tar.gz                  (includes share/models/ for install.sh)
#   * <tarball>.tar.gz.sha256
#   * <tarball>.tar.gz.manifest.sig    (when NEXUS_RELEASE_SIGNING_KEY set)
#   * bootstrap.sh                     (= scripts/bootstrap.sh)
#
# Docker / GHCR publishing was removed when the LAN-management feature
# replaced the docker-compose install path with bare-metal systemd. The
# previous `image` job and `ghcr.io/<owner>/nexus-engine:*` images stay
# reachable for anyone with a pinned tag but no new images are pushed.
# ---------------------------------------------------------------------------

name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re-)publish (e.g. v0.1.10). The GitHub Release with this tag must already exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # tarball — bare-metal release artifact.
  #
  # Builds a self-contained release tarball:
  #
  #   nexus-edge-vX.Y.Z-linux-x86_64.tar.gz
  #   ├── VERSION                         (just "vX.Y.Z\n")
  #   ├── MANIFEST.json                   (every file + sha256)
  #   ├── MANIFEST.json.sig               (Ed25519, when signing key set)
  #   ├── bin/
  #   │   ├── nexus-engine                (FEATURES=gstreamer,ort,ep-cpu,
  #   │   │                                ep-openvino,ep-cuda,ep-tensorrt)
  #   │   ├── nexus-probe
  #   │   └── nexus-doctor
  #   ├── lib/onnxruntime/                (libonnxruntime.so + OpenVINO
  #   │                                    EP + intel CPU/GPU/NPU plugins,
  #   │                                    extracted from the wheel)
  #   ├── share/
  #   │   ├── ui/                         (ui/dist/)
  #   │   └── models/                     (default model pack, pulled
  #   │                                    from models-${PACK_VERSION}
  #   │                                    release at workflow runtime)
  #   ├── etc-templates/
  #   │   ├── nexus.example.toml
  #   │   ├── tiers/{t10,t24,t36,t36s,t64}.toml
  #   │   └── systemd/nexus-engine.service
  #   └── scripts/
  #       ├── install.sh                  (in-tarball installer)
  #       ├── uninstall.sh
  #       └── lib/install-common.sh
  # -------------------------------------------------------------------------
  tarball:
    name: build + attach bare-metal tarball
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      ORT_VERSION: "1.22.0"
      FEATURES: "gstreamer,ort,ep-cpu,ep-openvino,ep-cuda,ep-tensorrt"
    permissions:
      contents: write   # required to `gh release upload`
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # ----------------------------------------------------------------
      # Stage the model pack from the dedicated `models-${PACK_VERSION}`
      # release. PACK_VERSION is read from `models/models-manifest.json`
      # (committed at the repo root), so an engine cut just inherits
      # whatever pack the manifest declares — no per-tag re-upload.
      #
      # Bumping the model pack:
      #   1. Regenerate ONNX (`python tools/models/gen_*.py --all-static`).
      #   2. Bump `pack_version` in models/models-manifest.json.
      #   3. Commit + push.
      #   4. `gh release create models-vN --prerelease --title "Model pack vN"`
      #      `gh release upload models-vN models/yolo26n_*.onnx \`
      #         `models/yolo_world_v2_s_*.onnx models/yoloe26_s.onnx \`
      #         `models/models-manifest.json`
      #
      # `--prerelease` on the models-* tag keeps it off the "Latest"
      # badge so it doesn't surface to operators downloading the engine.
      #
      # Auto-generation on the runner was considered but `yolo26n.pt` is
      # not a public ultralytics checkpoint — only the operator can run
      # the gen scripts.
      # ----------------------------------------------------------------
      - name: read model pack version
        id: model_pack
        run: |
          set -euo pipefail
          v="$(jq -r '.pack_version // empty' models/models-manifest.json)"
          if [[ -z "$v" ]]; then
            echo "::error::models/models-manifest.json is missing the 'pack_version' field. Set it to e.g. \"v1\" and cut the matching 'models-v1' release."
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Engine release $TAG will pull models from 'models-$v' release."

      - name: stage model pack from models-${{ steps.model_pack.outputs.version }} release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACK_TAG: models-${{ steps.model_pack.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p models
          # --clobber is required because models-manifest.json is also
          # uploaded as an asset to the pack release; the asset copy
          # carries the per-pack sha256 values and MUST win over the
          # committed copy that actions/checkout placed on disk.
          gh release download "$PACK_TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'yolo26n_640.onnx' \
            --pattern 'yolo26n_960.onnx' \
            --pattern 'yolo26n_1280.onnx' \
            --pattern 'yolo_world_v2_s_640.onnx' \
            --pattern 'yolo_world_v2_s_960.onnx' \
            --pattern 'yoloe26_s.onnx' \
            --pattern 'models-manifest.json' \
            --dir models/ \
            --clobber
          echo "Staged model pack from $PACK_TAG:"
          ls -la models/
          # yolo26n ships as three per-size static-shape exports (640/960/1280).
          # Per-tier defaults: T10/T24=640, T36/T36-S=960; 1280 is the
          # per-camera UI override for plate/face work. Static shapes are
          # mandatory for the Intel NPU plugin (silent CPU fallback on
          # dynamic shapes, observed on Lunar Lake k13 under v0.1.18).
          for f in yolo26n_640.onnx yolo26n_960.onnx yolo26n_1280.onnx yolo_world_v2_s_640.onnx yolo_world_v2_s_960.onnx yoloe26_s.onnx models-manifest.json; do
            if [ ! -s "models/$f" ]; then
              echo "::error::Required model asset 'models/$f' missing from release $PACK_TAG. Upload via 'gh release upload $PACK_TAG models/$f' (or bump pack_version in models/models-manifest.json to a release that has it)."
              exit 1
            fi
          done

      # ----------------------------------------------------------------
      # Engine build deps (mirrors ci.yml `system-libs` job).
      # ----------------------------------------------------------------
      - name: install build deps
        run: |
          sudo apt-get update
          # libunwind-dev: required for libgstreamer1.0-dev on
          # ubuntu-22.04 (24.04 resolves it transitively, 22.04 does
          # not). We pin to 22.04 here for older-glibc compat so the
          # binary tarball runs on the broadest set of target distros.
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential cmake \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-libav gstreamer1.0-tools \
            libssl-dev jq

      - name: install ONNX Runtime ${{ env.ORT_VERSION }} (for cargo link)
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | sudo tar -xz -C /opt
          sudo mv "/opt/onnxruntime-linux-x64-${ORT_VERSION}" /opt/onnxruntime

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: ""

      - uses: Swatinem/rust-cache@v2
        with:
          # shared-key MUST NOT contain commas (Swatinem/rust-cache@v2
          # rejects them via checkKey). Use a stable hand-picked label
          # instead of interpolating ${{ env.FEATURES }} which is the
          # comma-separated feature list.
          shared-key: tarball-all-eps

      - name: cargo build (release, all EPs)
        env:
          ORT_LIB_LOCATION: /opt/onnxruntime/lib
        run: |
          set -euo pipefail
          cargo build --release -p nexus-engine \
            --features "$FEATURES" \
            --bin nexus-engine --bin nexus-doctor
          cargo build --release -p nexus-probe --bin nexus-probe

      - uses: actions/setup-node@v5
        with: { node-version: "22" }

      - name: build UI
        run: |
          set -euo pipefail
          cd ui
          npm ci --no-fund --no-audit
          npm run build

      # Pull the OpenVINO-enabled libonnxruntime.so (and the intel
      # CPU/GPU/NPU plugins + TBB) out of the matching-ABI Python wheel.
      - name: stage ONNX Runtime + OpenVINO libs
        run: |
          set -euo pipefail
          python3 -m pip install --target /tmp/ovwheel \
            "onnxruntime-openvino==${ORT_VERSION}"
          mkdir -p stage/lib/onnxruntime
          cp -aP /tmp/ovwheel/onnxruntime/capi/*.so* stage/lib/onnxruntime/
          # `plugins.xml` is OpenVINO Core's device registry — without it,
          # `Core::get_available_devices()` returns an empty list and
          # `ParseDeviceType("NPU")` rejects with `[OpenVINO] You have
          # selected wrong configuration value for the key 'device_type'`,
          # silently falling back to CPU. The wheel ships it alongside the
          # plugin .so files in capi/, but it's not matched by `*.so*`.
          if [ -f /tmp/ovwheel/onnxruntime/capi/plugins.xml ]; then
            cp /tmp/ovwheel/onnxruntime/capi/plugins.xml \
               stage/lib/onnxruntime/plugins.xml
          else
            # Wheel layout changed? Fall back to writing the canonical
            # OV 2025.x plugin registry directly so the release isn't
            # silently broken.
            cat > stage/lib/onnxruntime/plugins.xml <<'PLUGINS_XML'
          <ie>
              <plugins>
                  <plugin location="libopenvino_intel_cpu_plugin.so" name="CPU"/>
                  <plugin location="libopenvino_intel_gpu_plugin.so" name="GPU"/>
                  <plugin location="libopenvino_intel_npu_plugin.so" name="NPU"/>
                  <plugin location="libopenvino_auto_plugin.so" name="AUTO"/>
                  <plugin location="libopenvino_auto_plugin.so" name="MULTI"/>
                  <plugin location="libopenvino_auto_plugin.so" name="BATCH"/>
                  <plugin location="libopenvino_hetero_plugin.so" name="HETERO"/>
              </plugins>
          </ie>
          PLUGINS_XML
          fi
          # The ort crate dlopens libonnxruntime.so (unversioned);
          # the wheel only ships the .so.${ORT_VERSION} soname.
          if [ ! -e "stage/lib/onnxruntime/libonnxruntime.so" ]; then
            ln -s "libonnxruntime.so.${ORT_VERSION}" \
                  "stage/lib/onnxruntime/libonnxruntime.so"
          fi
          # Sanity: every plugin referenced in plugins.xml must exist.
          # Fails the release loudly rather than shipping a broken tarball.
          missing=0
          for so in $(grep -oE 'location="[^"]+"' stage/lib/onnxruntime/plugins.xml | sed 's/location="//;s/"//'); do
            if [ ! -e "stage/lib/onnxruntime/$so" ]; then
              echo "::error::plugins.xml references $so but it is not in stage/"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1

      - name: assemble release tree
        run: |
          set -euo pipefail
          R="stage"
          mkdir -p "$R/bin" "$R/share/ui" "$R/share/models" \
                   "$R/etc-templates/tiers" "$R/etc-templates/systemd" \
                   "$R/scripts/lib"

          install -m 0755 target/release/nexus-engine "$R/bin/"
          install -m 0755 target/release/nexus-probe  "$R/bin/"
          install -m 0755 target/release/nexus-doctor "$R/bin/"

          cp -a ui/dist/. "$R/share/ui/"
          cp -a models/yolo26n_640.onnx \
                models/yolo26n_960.onnx \
                models/yolo26n_1280.onnx \
                models/yolo_world_v2_s_640.onnx \
                models/yolo_world_v2_s_960.onnx \
                models/yoloe26_s.onnx \
                models/models-manifest.json "$R/share/models/"

          cp config/nexus.example.toml   "$R/etc-templates/nexus.example.toml"
          cp config/tiers/t10.toml       "$R/etc-templates/tiers/"
          cp config/tiers/t24.toml       "$R/etc-templates/tiers/"
          cp config/tiers/t36.toml       "$R/etc-templates/tiers/"
          cp config/tiers/t36s.toml      "$R/etc-templates/tiers/"
          cp config/tiers/t64.toml       "$R/etc-templates/tiers/"

          cp deploy/systemd/nexus-engine.service \
             "$R/etc-templates/systemd/nexus-engine.service"

          cp scripts/install.sh   "$R/scripts/"
          cp scripts/uninstall.sh "$R/scripts/"
          cp scripts/lib/install-common.sh "$R/scripts/lib/"
          cp scripts/lib/release-pubkey.pem "$R/scripts/lib/"
          chmod +x "$R/scripts/install.sh" "$R/scripts/uninstall.sh"

          echo "$TAG" > "$R/VERSION"

          echo "--- staged tree ---"
          find "$R" -maxdepth 3 -type f | sort | head -40
          echo "--- size ---"
          du -sh "$R"

      - name: write MANIFEST.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os, stat
          root = "stage"
          files = []
          for dp, _, fns in os.walk(root):
              for fn in fns:
                  if fn in ("MANIFEST.json",):
                      continue
                  p = os.path.join(dp, fn)
                  rel = os.path.relpath(p, root)
                  h = hashlib.sha256()
                  with open(p, "rb") as f:
                      for chunk in iter(lambda: f.read(1 << 20), b""):
                          h.update(chunk)
                  st = os.stat(p)
                  files.append({
                      "path":   rel,
                      "sha256": h.hexdigest(),
                      "size":   st.st_size,
                      "mode":   stat.S_IMODE(st.st_mode),
                  })
          files.sort(key=lambda e: e["path"])
          with open(os.path.join(root, "VERSION")) as f:
              version = f.read().strip()
          manifest = {
              "version":     version,
              "files":       files,
              "file_count":  len(files),
              "total_bytes": sum(e["size"] for e in files),
          }
          with open(os.path.join(root, "MANIFEST.json"), "w") as f:
              json.dump(manifest, f, indent=2, sort_keys=True)
              f.write("\n")
          print(f"manifest: {len(files)} files, "
                f"{manifest['total_bytes']/1e6:.1f} MB")
          PY

      # Ed25519 sign MANIFEST.json with the operator-held private key
      # stored in the `NEXUS_RELEASE_SIGNING_KEY` GH secret. The
      # matching public key is committed at
      # `scripts/lib/release-pubkey.pem`; `install.sh` verifies the
      # signature before installing. Skipped (loud warning, NOT a
      # failure) when the secret is unset so the very first release
      # cut before key onboarding still ships a tarball — `install.sh`
      # in that case warns about unsigned releases but proceeds unless
      # `NEXUS_REQUIRE_SIGNATURE=1` is exported by the operator.
      - name: sign MANIFEST.json (Ed25519)
        env:
          NEXUS_RELEASE_SIGNING_KEY: ${{ secrets.NEXUS_RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${NEXUS_RELEASE_SIGNING_KEY:-}" ]]; then
            echo "::warning::NEXUS_RELEASE_SIGNING_KEY secret is unset; release tarball will be UNSIGNED. Configure the secret to enable signing."
            exit 0
          fi
          # Round-trip via a 0600 tempfile (`openssl pkeyutl -sign`
          # needs a file path, not stdin) and shred it after.
          umask 077
          keyfile="$(mktemp)"
          trap 'shred -u "$keyfile" 2>/dev/null || rm -f "$keyfile"' EXIT
          printf '%s\n' "$NEXUS_RELEASE_SIGNING_KEY" > "$keyfile"
          openssl pkeyutl -sign -inkey "$keyfile" -rawin \
            -in stage/MANIFEST.json -out stage/MANIFEST.json.sig
          # Sanity-check round trip with the committed pubkey so a
          # mismatched secret fails the workflow, not the operator.
          openssl pkeyutl -verify -pubin \
            -inkey scripts/lib/release-pubkey.pem -rawin \
            -in stage/MANIFEST.json -sigfile stage/MANIFEST.json.sig
          echo "MANIFEST.json signed and self-verified ($(wc -c < stage/MANIFEST.json.sig) bytes)"

      - name: package tarball
        id: pack
        run: |
          set -euo pipefail
          name="nexus-edge-${TAG}-linux-x86_64"
          # Rename stage/ -> <name>/ so the tarball has a sensible
          # top-level directory; tar's --transform would also work
          # but a mv is harder to misread.
          mv stage "$name"
          tar -czf "${name}.tar.gz" "$name"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          ls -lh "${name}.tar.gz" "${name}.tar.gz.sha256"
          # Hoist the in-tarball MANIFEST.json.sig (if signing ran)
          # out to a sibling asset so operators can grab it without
          # extracting the tarball first — same shape as .sha256.
          if [[ -f "${name}/MANIFEST.json.sig" ]]; then
            cp "${name}/MANIFEST.json.sig" "${name}.tar.gz.manifest.sig"
            echo "have_sig=1" >> "$GITHUB_OUTPUT"
          else
            echo "have_sig=0" >> "$GITHUB_OUTPUT"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: attach assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ steps.pack.outputs.name }}
          HAVE_SIG: ${{ steps.pack.outputs.have_sig }}
        run: |
          set -euo pipefail
          # --clobber so a workflow re-run replaces existing assets
          # instead of failing. bootstrap.sh is what operators curl
          # for the one-liner install (see docs/INSTALL.md §6.1).
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            "${NAME}.tar.gz" \
            "${NAME}.tar.gz.sha256"
          if [[ "$HAVE_SIG" == "1" ]]; then
            gh release upload "$TAG" \
              --repo "${{ github.repository }}" \
              --clobber \
              "${NAME}.tar.gz.manifest.sig"
          fi
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            "scripts/bootstrap.sh"
          # Standalone model files are NOT re-uploaded to the engine
          # release — they live on the matching `models-${PACK_VERSION}`
          # release (see "stage model pack" step above). External
          # tooling that needs an individual ONNX should pull from
          # `gh release download models-vN --pattern '...'`. This keeps
          # engine releases small and avoids per-cut 180 MB uploads.
          # The model files are still embedded in the tarball at
          # share/models/ for self-contained `install.sh` runs.
